<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jogo de Perguntas - CEBN</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Permanent+Marker&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="title">
        <img
          src="./assets/escudo.png.png"
          alt="Logo do Centro Educacional de Barra Nova"
        />
        <h1>Quiz CEBN</h1>
      </div>

      <!-- Seletores compactos no topo -->
      <div class="seletores-topo">
        <select id="ano-select" class="seletor">
          <option value="">Ano</option>
          <option value="ano6">6º Ano</option>
          <option value="ano7">7º Ano</option>
          <option value="ano8">8º Ano</option>
          <option value="ano9">9º Ano</option>
          <option value="geral">Geral</option>
        </select>

        <select id="tema-select" class="seletor" disabled>
          <option value="">Disciplina</option>
          <option value="portugues">Português</option>
          <option value="matematica">Matemática</option>
          <option value="historia">História</option>
          <option value="geografia">Geografia</option>
          <option value="ciencias">Ciências</option>
          <option value="ingles">Inglês</option>
          <option value="atualidades">Atualidades</option>
          <option value="todos">Todas</option>
        </select>
      </div>

      <div id="game">
        <img id="player" src="./assets/menina-menino.png" alt="Personagem" />
        <div id="question-container">
          <div id="question"></div>
        </div>
        <div id="score">Pontos: 0</div>
        <div id="errors">Erros: 0</div>
        <div id="feedback-msg"></div>
      </div>

      <button id="startBtn" disabled>Iniciar</button>
      <button id="restartBtn">Reiniciar</button>
      <div id="message" class="hidden"></div>
    </div>

    <script src="questions.js"></script>
    <script type="module" src="script.js"></script>
  </body>
</html>
